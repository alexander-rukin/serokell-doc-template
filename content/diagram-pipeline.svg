<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 150" width="760" height="150">
  <style>
    .box   { fill: #F5F6F7; stroke: #DDE1E5; stroke-width: 1; }
    .spine { fill: #D92B04; }
    .lbl   { font-family: "Google Sans Flex 24pt", sans-serif; font-size: 15px; font-weight: 600; fill: #1A1A1A; }
    .sub   { font-family: "Google Sans Flex 24pt", sans-serif; font-size: 11.5px; fill: #5A5F66; }
    .arrow { stroke: #5A5F66; stroke-width: 1.4; fill: none; }
  </style>

  <!-- Boxes span y 28..116. Text sits at 56 / 80 / 97, leaving ~18px of air
       above the title and ~19px below the last descender. -->

  <!-- Specification -->
  <rect class="box" x="8"  y="28" width="200" height="88" rx="4"/>
  <rect class="spine" x="8" y="28" width="3" height="88"/>
  <text class="lbl" x="26" y="56">Specification</text>
  <text class="sub" x="26" y="80">Agda model of the</text>
  <text class="sub" x="26" y="97">settlement machine</text>

  <!-- Verification -->
  <rect class="box" x="280" y="28" width="200" height="88" rx="4"/>
  <rect class="spine" x="280" y="28" width="3" height="88"/>
  <text class="lbl" x="298" y="56">Verification</text>
  <text class="sub" x="298" y="80">Machine-checked</text>
  <text class="sub" x="298" y="97">safety invariants</text>

  <!-- CI harness -->
  <rect class="box" x="552" y="28" width="200" height="88" rx="4"/>
  <rect class="spine" x="552" y="28" width="3" height="88"/>
  <text class="lbl" x="570" y="56">CI harness</text>
  <text class="sub" x="570" y="80">Proofs re-run on</text>
  <text class="sub" x="570" y="97">every commit</text>

  <!-- arrows -->
  <path class="arrow" d="M 214 72 L 268 72"/>
  <path class="arrow" d="M 262 66 L 270 72 L 262 78"/>
  <path class="arrow" d="M 486 72 L 540 72"/>
  <path class="arrow" d="M 534 66 L 542 72 L 534 78"/>
</svg>
